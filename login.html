<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Faruq Academy</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

.container{
    width:90%;
    max-width:450px;
    margin:60px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0066cc;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#004c99;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#0066cc;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>🔐 Student Login</h1>

<form>

<input
type="email"
placeholder="Email Address"
required>

<input
type="password"
placeholder="Password"
required>

<button type="submit">
Login
</button>

</form>

<a href="index.html" class="back">
← Back to Homepage
</a>

</div>

</div>

</body>
</html>
