<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Faruq Academy</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f5fc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    width:350px;
}

h2{
    text-align:center;
    color:#0066cc;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#004c99;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#0066cc;
}
</style>

</head>
<body>

<div class="card">

<h2>🔐 Faruq Academy Admin</h2>

<input
type="text"
id="username"
placeholder="Username">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<a href="index.html" class="back">
← Back to Homepage
</a>

</div>

<script>

function login(){

const username=document.getElementById("username").value.trim();
const password=document.getElementById("password").value;

if(username==="admin" && password==="faruq123"){

window.location.href="admin.html";

}else{

alert("Incorrect username or password!");

}

}

</script>

</body>
</html>
