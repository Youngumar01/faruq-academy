<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Faruq Academy</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f5fc;
margin:0;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
text-align:center;
color:#0066cc;
}

input,select{
width:100%;
padding:15px;
margin:12px 0;
font-size:18px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
background:#0066cc;
color:white;
border:none;
border-radius:8px;
font-size:20px;
cursor:pointer;
}

button:hover{
background:#004c99;
}

.back{
display:block;
text-align:center;
margin-top:20px;
color:#0066cc;
text-decoration:none;
}
</style>

</head>
<body>

<div class="container">
<div class="card">

<h1>🎓 Join Faruq Academy</h1>

<form
name="student-registration"
method="POST"
data-netlify="true"
action="/success.html"
>

<input type="hidden" name="form-name" value="student-registration">

<input
type="text"
name="fullName"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<select
name="course"
required>

<option value="">Select a Course</option>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>Python</option>

</select>

<button type="submit">
Register Now 🚀
</button>

</form>

<a href="index.html" class="back">
← Back to Homepage
</a>

</div>
</div>

</body>
</html>
