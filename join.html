<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Faruq Academy</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f5fc;
}

.container{
    width:90%;
    max-width:500px;
    margin:50px auto;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0066cc;
}

p{
    text-align:center;
    color:#666;
}

input,select{
    width:100%;
    padding:15px;
    margin:12px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:17px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#0066cc;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#004c99;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#0066cc;
}
</style>

<script>
function registerStudent(event){
    event.preventDefault();

    const fullname=document.getElementById("fullname").value;
    const email=document.getElementById("email").value;
    const course=document.getElementById("course").value;

    if(fullname==="" || email==="" || course===""){
        alert("Please fill in all fields.");
        return;
    }

    window.location.href="success.html";
}
</script>

</head>
<body>

<div class="container">

<div class="card">

<h1>🎓 Join Faruq Academy</h1>

<p>Register below to join our academy.</p>

<form onsubmit="registerStudent(event)">

<input
id="fullname"
type="text"
placeholder="Full Name"
required>

<input
id="email"
type="email"
placeholder="Email Address"
required>

<select
id="course"
required>

<option value="">Select a Course</option>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>Python</option>

</select>

<button type="submit">
🚀 Register Now
</button>

</form>

<a href="index.html" class="back">
← Back to Homepage
</a>

</div>

</div>

</body>
</html>
