<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Faruq Academy</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

.container{
    width:90%;
    max-width:500px;
    margin:50px auto;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.15);
}

h1{
    text-align:center;
    color:#0066cc;
}

input,select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#004c99;
}

.back{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#0066cc;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🎓 Join Faruq Academy</h1>

<form
name="student-registration"
method="POST"
data-netlify="true"
action="success.html">

<input type="hidden" name="form-name" value="student-registration">

<input
type="text"
name="fullname"
placeholder="Full Name"
required>

<input
type="email"
name="email"
placeholder="Email Address"
required>

<select
name="course"
required>

<option value="">Select a Course</option>
<option>HTML</option>
<option>CSS</option>
<option>JavaScript</option>
<option>Python</option>

</select>

<button type="submit">
Register Now 🚀
</button>

</form>

<a href="index.html" class="back">
← Back to Homepage
</a>

</div>

</div>

</body>
</html>
